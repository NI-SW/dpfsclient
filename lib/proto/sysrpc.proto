// 初版部分参数固定，后续根据实际需求调整
message MakeTradeReq {
  int32 husr = 1;
  string schema_name = 2;
  string structure_name = 3;
  int64 jyid = 4;
  int32 start_uid = 5; // 交易商品起始uid
  int32 num = 6; // 交易商品数量
  // 买方名称
  string mfmc = 7;
  // 买方地址
  string mfdz = 8;
  // 买方联系方式
  string mflx = 9;
  // 卖方名称
  string ffmc = 10;
  // 卖方地址
  string ffdz = 11;
  // 卖方联系方式
  string fflx = 12;
  // 物流信息
  string wlxx = 13;
  // 其他信息,暂不处理
  string others = 14;
  // 发生金额
  string fsje = 15;

}

message CreateTracableProReq {
  int32 husr = 1;
  string schema_name = 2;
  string structure_name = 3;
  map<string, string> base_info = 4; // 需要包含特定列名和对应的值，例如：SPKZB表中的bidx列和具体的bidx值
  // <配料名称，配料占比>
  map<string, string> ingredient_infos = 5;
  // repeated string ingredient_names = 5; // 需要追溯的原料控制表名
  int32 total_production_num = 6; // 总商品量
}

message CreateTracableProReply {
  int32 rc = 1;
  string msg = 2;
  bytes trace_code_prefix = 3; // 生成的追溯码前缀，用于标识批次
  // 使用前缀组合产品id可以溯源一件产品
}

message TraceBackReq {
  int32 husr = 1;
  // |SPXXB BIDX(16B)|PRODUCTION ID(4B)|
  bytes trace_code = 2;
  bool show_detail = 3; // 是否展示详细信息
}

message TraceBackReply {
  int32 rc = 1;
  string msg = 2;
  string trace_back_result = 3;
}

message LoginReq {
  string username = 1;
  string password = 2;
}

message LoginReply {
  int32 rc = 1;
  int32 husr = 2;
  string msg = 3;
}
message LogoffReq {
  int32 husr = 1;
}


message Exesql {
  int32 husr = 1;
  string sql = 2;
}

message OperateReply {
  int32 rc = 1;
  string msg = 2;
}

// The request message containing the user's name.
message GetTableRequest {
  int32 husr = 1;
  string schema_name = 2;
  string table_name = 3;
}


// The response message containing the greetings
message GetTableReply {
  bytes table_handle = 1;
  int32 rc = 2;
  string msg = 3;
  // m_cltInfoCache中的zptr指针指向的内容
  bytes table_infos = 4;
}

message GetRowRequest {
  // table bidx
  int32 husr = 1;
  string schema_name = 2;
  string tab_name = 3;
  bytes key_val = 4;
}

message GetRowReply {
  // return code
  int32 rc = 1;

  // return message
  string msg = 2;

  // row data, copy to CItem's m_ptr 
  bytes row_data = 3;
}

message InsertRequest {
  int32 husr = 1;
  bytes table_handle = 2;
  // fullfile CItem's rowNumber
  uint32 row_number = 3;
  // copy to CItem's m_ptr 
  bytes row_data = 4;
}

message GetIdxIterReq {
  int32 husr = 1;
  bytes table_handle = 2;
  repeated string col_names = 3;
  repeated bytes key_vals = 4;
}

message GetIdxIterReply {
  int32 rc = 1;
  string msg = 2;
  // idxIterIdentifier, used to identify the iterator on the server side, and used for subsequent data I/O operations on this table, such as query, etc.
  int32 hidx = 3;
  // 当前批次结果
  bytes data = 4;
}

message FetchNextRowSetsReq {
  int32 rc = 1;
  int32 husr = 2;
  int32 hidx = 3;
  int32 acquire_row_number = 4;

}

message FetchNextRowSetsReply {
  int32 rc = 1;
  string msg = 2;
  repeated bytes data = 3;
}

message ReleaseIdxIterReq {
  int32 rc = 1;
  int32 husr = 2;
  int32 hidx = 3;
}


