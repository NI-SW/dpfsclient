syntax = "proto3";

package dpfsgrpc;

/*
  * SysCtl service definition
  * This service provides system control operations, such as login, logoff, execSQL, getTableHandle, getIdxIter, etc.
  * The service is implemented by the server and called by the client through gRPC.
*/
service SysCtl {
  // 登录，返回登录结果和用户句柄
  rpc Login(LoginReq) returns (LoginReply) {}

  // 注销登录用户
  rpc Logoff(LogoffReq) returns (OperateReply) {}

  // 输入SQL语句，返回执行结果
  rpc ExecSQL (Exesql) returns (OperateReply) {}
  // 返回整表信息 ：： CCollection::m_cltInfoCache中的zptr指针指向的内容, 客户端直接使用CCollection::collectionStruct加载表信息
  rpc GetTableHandle  (GetTableRequest) returns (GetTableReply) {}
  // 传入要插入的数据，返回执行结果
  rpc InsertTable     (InsertRequest) returns (OperateReply) {}
  // 传入主键，返回一行数据
  rpc GetRow          (GetRowRequest) returns (GetRowReply) {}
  // 传入索引列名和值，返回检索迭代器
  rpc GetIdxIter      (GetIdxIterReq) returns (GetIdxIterReply) {}
  // 传入迭代器标识，释放服务器端的迭代器资源
  rpc ReleaseIdxIter   (ReleaseIdxIterReq) returns (OperateReply) {}
  // 传入迭代器标识，获取下一批结果集
  rpc FetchNextRowSets   (FetchNextRowSetsReq) returns (FetchNextRowSetsReply) {}

  // 创建可溯源结构
  rpc CreateTracablePro (CreateTracableProReq) returns (CreateTracableProReply) {}
  // 查询溯源信息，返回溯源结果
  rpc TraceBack(TraceBackReq) returns (TraceBackReply) {}

  // 执行交易操作，输入交易相关信息，返回执行结果
  rpc MakeTrade (MakeTradeReq) returns (OperateReply) {}

  // 继续向后获取结果集
  // rpc nextRowSets () returns () {}
  // 继续向前获取结果集
  // rpc prevRowSets () returns () {}

  // 传入要删除的行，返回执行结果
  // rpc deleteItem      (htable) returns (operateReply) {}
  // 输入表名，删除表
  // rpc dropTable       (htable) returns (operateReply) {}

  // 加入分布式组
  // rpc JoinGroup (JoinGroupRequest) returns (JoinGroupReply) {}

  // 请求不属于本节点，转发请求
  // rpc RequestForward (RequestForwardRequest) returns (RequestForwardReply) {}

}

